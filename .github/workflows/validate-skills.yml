name: Validate Skills

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Validate skills
        run: |
          set -e
          # Loop through all top-level directories
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              echo "====================================="
              echo "✅ Validating ${dir}..."
              echo "====================================="
              uvx --from skills-ref agentskills validate "${dir}"
            fi
          done

  test-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run automation unit tests
        run: |
          python -m pytest _automation/tests/ -v
